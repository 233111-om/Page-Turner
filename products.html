<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | PageTurner Books</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--ink:#1a1208;
--parchment:#f5f0e8;
--cream:#fdf8f0;
--amber:#c8782a;
--amber-dark:#9a5a18;
--muted:#8a7a65;
--card:#fff9f0;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);}
nav{
background:var(--ink);
padding:18px 40px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;top:0;z-index:100;
}
.logo{font-family:'Playfair Display',serif;color:var(--parchment);font-size:1.5rem;letter-spacing:1px;}
.logo span{color:var(--amber);font-style:italic;}
nav a{color:var(--parchment);text-decoration:none;font-size:.85rem;font-weight:500;letter-spacing:.5px;opacity:.8;transition:.2s;}
nav a:hover{opacity:1;color:var(--amber);}
.nav-links{display:flex;gap:28px;align-items:center;}
.cart-btn{
background:var(--amber);
color:var(--ink) !important;
padding:8px 18px;
border-radius:2px;
font-weight:500;
opacity:1 !important;
font-size:.85rem;
}
.cart-btn:hover{background:var(--amber-dark);color:#fff !important;}

.hero{
padding:60px 40px 40px;
text-align:center;
background:linear-gradient(to bottom,var(--parchment),var(--cream));
border-bottom:1px solid #e8dcc8;
}
.hero h1{font-family:'Playfair Display',serif;font-size:3rem;letter-spacing:-1px;margin-bottom:10px;}
.hero p{color:var(--muted);font-size:.95rem;font-weight:300;}

.filter-bar{
display:flex;gap:10px;justify-content:center;
padding:24px 40px;
flex-wrap:wrap;
}
.filter-btn{
background:transparent;border:1.5px solid #d4c4a8;
padding:7px 18px;border-radius:2px;
font-family:'DM Sans',sans-serif;font-size:.8rem;
color:var(--muted);cursor:pointer;transition:.2s;
letter-spacing:.4px;
}
.filter-btn.active,.filter-btn:hover{
background:var(--ink);color:var(--parchment);border-color:var(--ink);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:28px;
padding:20px 40px 60px;
max-width:1200px;
margin:0 auto;
}
.card{
background:var(--card);
border:1px solid #e8dcc8;
border-radius:4px;
overflow:hidden;
transition:.25s;
cursor:pointer;
position:relative;
}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(26,18,8,.12);}
.card-img{
width:100%;height:260px;object-fit:cover;
display:block;
}
.badge{
position:absolute;top:12px;left:12px;
background:var(--amber);color:#fff;
font-size:.7rem;font-weight:500;letter-spacing:.5px;
padding:4px 10px;border-radius:2px;
}
.card-body{padding:16px;}
.genre{font-size:.72rem;color:var(--amber);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.card-body h3{font-family:'Playfair Display',serif;font-size:1.05rem;margin-bottom:4px;line-height:1.3;}
.author{font-size:.8rem;color:var(--muted);margin-bottom:12px;}
.card-footer{
display:flex;align-items:center;justify-content:space-between;
padding-top:12px;border-top:1px solid #ede3d2;
}
.price{font-weight:500;font-size:1rem;color:var(--ink);}
.add-btn{
background:var(--ink);color:var(--parchment);
border:none;padding:8px 14px;border-radius:2px;
font-family:'DM Sans',sans-serif;font-size:.8rem;
cursor:pointer;transition:.2s;letter-spacing:.3px;
}
.add-btn:hover{background:var(--amber);}

.toast{
position:fixed;bottom:24px;right:24px;
background:var(--ink);color:var(--parchment);
padding:12px 22px;border-radius:3px;font-size:.85rem;
transform:translateY(80px);opacity:0;transition:.3s;z-index:200;
border-left:3px solid var(--amber);
}
.toast.show{transform:translateY(0);opacity:1;}
footer{background:var(--ink);color:var(--muted);text-align:center;padding:20px;font-size:.8rem;}
</style>
</head>
<body>
<nav>
  <div class="logo">Page<span>Turner</span></div>
  <div class="nav-links">
    <a href="products.html">Books</a>
    <a href="cart.html" class="cart-btn">🛒 Cart (<span id="count">0</span>)</a>
  </div>
</nav>

<div class="hero">
  <h1>Our Collection</h1>
  <p>Handpicked reads for every kind of reader</p>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterBooks('all',this)">All</button>
  <button class="filter-btn" onclick="filterBooks('Fiction',this)">Fiction</button>
  <button class="filter-btn" onclick="filterBooks('Non-Fiction',this)">Non-Fiction</button>
  <button class="filter-btn" onclick="filterBooks('Mystery',this)">Mystery</button>
  <button class="filter-btn" onclick="filterBooks('Sci-Fi',this)">Sci-Fi</button>
</div>

<div class="products" id="products"></div>
<div class="toast" id="toast"></div>
<footer><p>© PageTurner Books — Est. 2024 · Stories worth keeping</p></footer>

<script>
const books=[
  {id:1,name:"The Midnight Library",author:"Matt Haig",price:399,genre:"Fiction",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1602190253i/52578297.jpg",badge:"Bestseller"},
  {id:2,name:"Atomic Habits",author:"James Clear",price:449,genre:"Non-Fiction",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1655988385i/40121378.jpg",badge:""},
  {id:3,name:"Gone Girl",author:"Gillian Flynn",price:349,genre:"Mystery",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1554086139i/19288043.jpg",badge:""},
  {id:4,name:"Dune",author:"Frank Herbert",price:499,genre:"Sci-Fi",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1555447414i/44767458.jpg",badge:"Classic"},
  {id:5,name:"The Alchemist",author:"Paulo Coelho",price:299,genre:"Fiction",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1654371463i/18144590.jpg",badge:""},
  {id:6,name:"Sapiens",author:"Yuval Noah Harari",price:529,genre:"Non-Fiction",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1703329310i/23692271.jpg",badge:"Award"},
  {id:7,name:"The Da Vinci Code",author:"Dan Brown",price:379,genre:"Mystery",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1579621267i/968.jpg",badge:""},
  {id:8,name:"Project Hail Mary",author:"Andy Weir",price:459,genre:"Sci-Fi",img:"https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1597695864i/54493401.jpg",badge:"New"}
];

let cart=JSON.parse(localStorage.getItem("ptCart"))||[];
document.getElementById("count").innerText=cart.length;

function render(list){
  const c=document.getElementById("products");
  c.innerHTML="";
  list.forEach(b=>{
    c.innerHTML+=`<div class="card">
      ${b.badge?`<div class="badge">${b.badge}</div>`:""}
      <img class="card-img" src="${b.img}" alt="${b.name}" onerror="this.src='https://via.placeholder.com/220x260/f5f0e8/c8782a?text=Book'">
      <div class="card-body">
        <div class="genre">${b.genre}</div>
        <h3>${b.name}</h3>
        <div class="author">${b.author}</div>
        <div class="card-footer">
          <span class="price">₹${b.price}</span>
          <button class="add-btn" onclick="addCart(${b.id})">Add to Cart</button>
        </div>
      </div>
    </div>`;
  });
}

function filterBooks(genre,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(genre==='all'?books:books.filter(b=>b.genre===genre));
}

function addCart(id){
  const book=books.find(b=>b.id===id);
  cart.push({id:book.id,name:book.name,price:book.price,author:book.author,img:book.img});
  localStorage.setItem("ptCart",JSON.stringify(cart));
  document.getElementById("count").innerText=cart.length;
  showToast(`"${book.name}" added to cart`);
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

render(books);
</script>
</body>
</html>
